    input.addEventListener("input", () => {

    input.addEventListener("focus", () => {
      if (input.selectionStart < prefix.length) {
        input.setSelectionRange(prefix.length, prefix.length);
      }
    });

      if (
        (e.key === "Backspace" && input.selectionStart <= prefix.length) ||
